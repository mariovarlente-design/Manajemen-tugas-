<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurir - PT Klase Auto Graha</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="KlaseKurir">
    <link rel="apple-touch-icon" href="https://oyakbndsejhpqsvycdud.supabase.co/storage/v1/object/public/logo/fsimage%20(1).png">
    <link rel="manifest" href="manifest.json">
    
    <!-- CDN URLs (TANPA SPASI) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50">

    <!-- Navbar -->
    <nav class="bg-blue-500 shadow-md no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <img src="https://oyakbndsejhpqsvycdud.supabase.co/storage/v1/object/public/logo/fsimage%20(1).png" class="h-8 mr-3" alt="Logo">
                    <span class="text-white font-bold text-lg hidden sm:block">PT Klase Auto Graha</span>
                </div>
                <div class="flex items-center">
                    <button id="btnLogout" class="text-white hover:text-slate-200 text-sm"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">Tugas Pengiriman Saya</h1>
        <div id="taskList" class="space-y-4">
            <div class="text-center text-slate-500 py-10">Memuat tugas...</div>
        </div>
    </div>

    <!-- PWA Install Prompt -->
    <div id="installContainer" class="fixed bottom-4 left-4 right-4 z-50 no-print hidden">
        <div class="bg-blue-600 text-white rounded-xl shadow-lg p-4 flex items-center justify-between">
            <div class="flex items-center">
                <i class="fas fa-download mr-3 text-xl"></i>
                <div>
                    <p class="font-semibold">Install Aplikasi Kurir</p>
                    <p class="text-xs text-blue-100">Akses cepat tanpa browser</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="btnInstall" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold text-sm hover:bg-blue-50 transition">Install</button>
                <button id="btnDismissInstall" class="text-blue-200 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

    <!-- SCRIPT UTAMA -->
    <script>
    (function() {
        'use strict';
        
        // === 🛡️ GUARD CLAUSE: Proteksi Akses (PALING ATAS) ===
        if (localStorage.getItem('role') !== 'kurir') {
            window.location.replace('index.html');
            return;
        }
        
        // === KONFIGURASI (TANPA SPASI!) ===
        const SUPABASE_URL = 'https://oyakbndsejhpqsvycdud.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95YWtibmRzZWpocHFzdnljZHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODYwMjksImV4cCI6MjA4ODk2MjAyOX0.oH7XK00yZNKAuDF2GnXtdU3PUYRWtMQ4I43Q13AC9KE';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const myId = localStorage.getItem('userId');

        // === PWA INSTALL PROMPT ===
        let deferredPrompt;
        const installContainer = document.getElementById('installContainer');
        const btnInstall = document.getElementById('btnInstall');
        const btnDismiss = document.getElementById('btnDismissInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installContainer) installContainer.classList.remove('hidden');
        });

        btnInstall?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            if (installContainer) installContainer.classList.add('hidden');
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`📱 Install ${outcome}`);
            deferredPrompt = null;
        });

        btnDismiss?.addEventListener('click', () => {
            if (installContainer) installContainer.classList.add('hidden');
        });

        function isPWA() {
            return window.matchMedia('(display-mode: standalone)').matches || 
                   window.navigator.standalone || 
                   document.referrer.includes('android-app://');
        }

        if (isPWA()) {
            if (installContainer) installContainer.classList.add('hidden');
            console.log('🚀 Running as PWA');
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('✅ SW registered:', reg.scope))
                .catch(err => console.warn('⚠️ SW failed:', err));
        }

        // === LOAD TUGAS ===
        async function loadMyTasks() {
            const container = document.getElementById('taskList');
            if (!container) return;
            
            container.innerHTML = '<div class="text-center text-slate-500 py-10 bg-white rounded-xl shadow-sm">Memuat tugas...</div>';
            
            try {
                const { data, error } = await supabase
                    .from('tasks')
                    .select('*')
                    .eq('assigned_to', myId)
                    .order('created_at', { ascending: false });
                    
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-500 py-10 bg-white rounded-xl shadow-sm">✅ Tidak ada tugas aktif.</div>';
                    return;
                }

                container.innerHTML = '';
                data.forEach(t => {
                    const isDone = t.status === 'selesai';
                    const statusColor = isDone ? 'border-green-500 bg-green-50' : 'border-blue-500 bg-white';
                    const statusBadge = isDone 
                        ? '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">Selesai</span>'
                        : '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-yellow-100 text-yellow-800">Perlu Aksi</span>';
                    
                    let actionArea = '';
                    if (!isDone) {
                        actionArea = `
                            <div class="mt-4 pt-4 border-t border-slate-200">
                                <label class="block text-sm font-medium text-slate-700 mb-2">Upload Bukti Terima</label>
                                <input type="file" id="file-${t.id}" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
                                <button id="btnComplete-${t.id}" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition">
                                    <i class="fas fa-check-circle mr-2"></i> Tandai Selesai
                                </button>
                            </div>
                        `;
                    } else {
                        actionArea = `
                            <div class="mt-4 pt-4 border-t border-slate-200 text-center">
                                <span class="text-green-600 font-bold"><i class="fas fa-check-circle"></i> Tugas Selesai</span>
                                ${t.bukti_url ? `<br><a href="${t.bukti_url}" target="_blank" class="text-sm text-blue-600 underline mt-2 inline-block">Lihat Bukti Foto</a>` : ''}
                            </div>
                        `;
                    }

                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border-l-4 ${statusColor} p-6 transition hover:shadow-md">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-lg font-bold text-slate-800">${t.nama_pt || '-'}</h3>
                                    <p class="text-slate-500 text-sm"><i class="fas fa-map-marker-alt mr-1"></i> ${t.alamat_singkat || '-'}</p>
                                </div>
                                ${statusBadge}
                            </div>
                            <div class="mt-4 grid grid-cols-2 gap-4 text-sm">
                                <div><span class="text-slate-400 block">No Surat</span><span class="font-medium text-slate-700">${t.no_surat || '-'}</span></div>
                                <div><span class="text-slate-400 block">Penerima</span><span class="font-medium text-slate-700">${t.penerima || '-'}</span></div>
                                <div class="col-span-2"><span class="text-slate-400 block">Tgl Kirim</span><span class="font-medium text-slate-700">${t.tanggal_pengiriman || '-'}</span></div>
                            </div>
                            ${actionArea}
                        </div>
                    `;
                    
                    if (!isDone) {
                        document.getElementById(`btnComplete-${t.id}`)?.addEventListener('click', () => completeTask(t.id));
                    }
                });
                
            } catch (err) {
                console.error('Error loading tasks:', err);
                container.innerHTML = `<div class="text-center text-red-500 py-10 bg-white rounded-xl shadow-sm">❌ Gagal: ${err.message || 'Periksa koneksi internet'}</div>`;
            }
        }

        // === COMPLETE TASK ===
        async function completeTask(id) {
            const fileInput = document.getElementById(`file-${id}`);
            if (!fileInput || fileInput.files.length === 0) {
                return alert('Mohon upload foto bukti terlebih dahulu');
            }

            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `bukti_${id}_${Date.now()}.${fileExt}`;
            
            const btn = document.getElementById(`btnComplete-${id}`);
            if (btn) {
                btn.innerText = 'Mengupload...';
                btn.disabled = true;
            }

            try {
                // 1. Upload file ke bucket 'bukti'
                const { error: uploadError } = await supabase.storage
                    .from('bukti')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // 2. Ambil Public URL
                const urlResult = supabase.storage.from('bukti').getPublicUrl(fileName);
                const publicUrl = urlResult.data.publicUrl;

                // 3. Update database
                const { error: updateError } = await supabase
                    .from('tasks')
                    .update({ status: 'selesai', bukti_url: publicUrl })
                    .eq('id', id);
                    
                if (updateError) throw updateError;
                
                alert('✅ Tugas berhasil diselesaikan!');
                loadMyTasks();
                
            } catch (err) {
                console.error('Error:', err);
                alert('❌ Gagal: ' + (err.message || 'Upload error'));
                if (btn) {
                    btn.innerText = 'Tandai Selesai';
                    btn.disabled = false;
                }
            }
        }

        // === LOGOUT ===
        function logout() { 
            localStorage.clear(); 
            window.location.replace('index.html'); 
        }

        // === EVENT LISTENERS ===
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('btnLogout')?.addEventListener('click', logout);
            loadMyTasks();
        });

    })();
    </script>
</body>
</html>
