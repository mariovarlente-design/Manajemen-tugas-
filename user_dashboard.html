<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kurir - PT Klase Auto Graha</title>
    
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="KlaseKurir">
    <link rel="apple-touch-icon" href="https://oyakbndsejhpqsvycdud.supabase.co/storage/v1/object/public/logo/fsimage%20(1).png">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style> 
        body { font-family: 'Inter', sans-serif; } 
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: 700; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <nav class="bg-blue-600 shadow-md no-print sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <img src="https://oyakbndsejhpqsvycdud.supabase.co/storage/v1/object/public/logo/fsimage%20(1).png" class="h-8 mr-3 bg-white rounded-sm p-0.5" alt="Logo">
                    <span class="text-white font-bold text-lg hidden sm:block">PT Klase Auto Graha</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="userNameDisplay" class="text-white text-sm font-medium hidden md:block">Kurir</span>
                    <button id="btnLogout" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg text-sm transition flex items-center gap-2">
                        <i class="fas fa-sign-out-alt"></i> <span class="hidden sm:inline">Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-8 flex-grow w-full">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Tugas Pengiriman</h1>
            <button id="btnDownloadCSV" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold py-2 px-4 rounded-xl transition flex items-center gap-2 shadow-sm">
                <i class="fas fa-file-excel"></i> Unduh Riwayat (.csv)
            </button>
        </div>

        <div class="flex bg-white rounded-xl shadow-sm p-1 mb-6 border border-slate-200">
            <button id="tabPending" class="flex-1 py-2.5 text-sm font-medium text-center rounded-lg transition tab-active" onclick="switchTab('pending')">
                Tugas Aktif
            </button>
            <button id="tabSelesai" class="flex-1 py-2.5 text-sm font-medium text-center rounded-lg transition text-slate-500 hover:bg-slate-50" onclick="switchTab('selesai')">
                Riwayat Selesai
            </button>
        </div>

        <div id="taskList" class="space-y-4">
            <div class="text-center text-slate-500 py-20 bg-white rounded-2xl shadow-sm border border-slate-200">
                <i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-blue-500"></i>
                <p>Memuat tugas Anda...</p>
            </div>
        </div>
    </div>

    <div id="installContainer" class="fixed bottom-6 left-4 right-4 z-50 no-print hidden">
        <div class="bg-slate-900 text-white rounded-2xl shadow-2xl p-5 flex items-center justify-between border border-slate-700">
            <div class="flex items-center">
                <div class="bg-blue-600 p-3 rounded-xl mr-4">
                    <i class="fas fa-mobile-alt text-xl"></i>
                </div>
                <div>
                    <p class="font-bold">Gunakan Versi Aplikasi</p>
                    <p class="text-xs text-slate-400">Instal di layar utama untuk akses lebih cepat</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="btnInstall" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-700 transition">Instal</button>
                <button id="btnDismissInstall" class="text-slate-400 hover:text-white px-2"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t border-slate-200 py-6 mt-10">
        <div class="max-w-5xl mx-auto px-2 text-center text-sm text-slate-400">
            © 2026 PT Klase Auto Graha • Sistem Manajemen Kurir • by:rionurmansyah
        </div>
    </footer>

    <script>
    (function() {
        'use strict';
        
        // Proteksi Akses
        if (localStorage.getItem('role') !== 'kurir') {
            window.location.replace('index.html');
            return;
        }
        
        const SUPABASE_URL = 'https://oyakbndsejhpqsvycdud.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95YWtibmRzZWpocHFzdnljZHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODYwMjksImV4cCI6MjA4ODk2MjAyOX0.oH7XK00yZNKAuDF2GnXtdU3PUYRWtMQ4I43Q13AC9KE';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const myId = localStorage.getItem('userId');
        let allTasks = [];
        let activeFilter = 'pending';

        // PWA logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installContainer')?.classList.remove('hidden');
        });

        document.getElementById('btnInstall')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('installContainer')?.classList.add('hidden');
        });

        document.getElementById('btnDismissInstall')?.addEventListener('click', () => {
            document.getElementById('installContainer')?.classList.add('hidden');
        });

        // Load Nama Profile
        async function loadProfile() {
            try {
                const { data } = await supabase.from('profiles').select('full_name').eq('id', myId).single();
                if (data) document.getElementById('userNameDisplay').innerText = data.full_name;
            } catch (e) {}
        }

        // Fetch Data dari Supabase
        async function fetchTasks() {
            const container = document.getElementById('taskList');
            try {
                const { data, error } = await supabase
                    .from('tasks')
                    .select('*')
                    .eq('assigned_to', myId)
                    .order('created_at', { ascending: false });
                if (error) throw error;
                allTasks = data || [];
                renderTasks();
            } catch (err) {
                container.innerHTML = `<div class="bg-red-50 p-6 rounded-2xl text-red-600 text-center">Gagal memuat: ${err.message}</div>`;
            }
        }

        // Tab Switcher
        window.switchTab = function(status) {
            activeFilter = status;
            document.getElementById('tabPending').classList.toggle('tab-active', status === 'pending');
            document.getElementById('tabPending').classList.toggle('text-slate-500', status !== 'pending');
            document.getElementById('tabSelesai').classList.toggle('tab-active', status === 'selesai');
            document.getElementById('tabSelesai').classList.toggle('text-slate-500', status !== 'selesai');
            renderTasks();
        };

        // Render Cards
        function renderTasks() {
            const container = document.getElementById('taskList');
            const filtered = allTasks.filter(t => t.status === activeFilter);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 py-16 bg-white rounded-2xl border-2 border-dashed border-slate-200">
                    <i class="fas fa-inbox text-4xl mb-3 block"></i>
                    Belum ada tugas di kategori ini.
                </div>`;
                return;
            }

            container.innerHTML = '';
            filtered.forEach(t => {
                const isDone = t.status === 'selesai';
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition hover:shadow-md";
                
                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-lg text-slate-800">${t.nama_pt || '-'}</h3>
                                <p class="text-blue-600 text-sm font-semibold">${t.no_surat || '-'}</p>
                            </div>
                            <span class="px-3 py-1 text-xs font-bold rounded-full ${isDone ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                                ${isDone ? 'SELESAI' : 'TUGAS AKTIF'}
                            </span>
                        </div>
                        
                        <div class="space-y-3 text-sm mb-6">
                            <div class="flex items-center text-slate-600">
                                <i class="fas fa-map-marker-alt w-6 text-slate-400"></i>
                                <span>${t.alamat_singkat || '-'}</span>
                            </div>
                            <div class="flex items-center text-slate-600">
                                <i class="fas fa-user w-6 text-slate-400"></i>
                                <span>Penerima: ${t.penerima || '-'}</span>
                            </div>
                            <div class="flex items-center text-slate-600">
                                <i class="fas fa-calendar-alt w-6 text-slate-400"></i>
                                <span>Tanggal: ${t.tanggal_pengiriman || '-'}</span>
                            </div>
                        </div>

                        ${!isDone ? `
                            <div class="pt-4 border-t border-slate-100">
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Upload Bukti Foto</label>
                                <input type="file" id="file-${t.id}" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                                <button onclick="completeTask('${t.id}')" id="btn-${t.id}" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                                    <i class="fas fa-check-circle"></i> Selesaikan Tugas
                                </button>
                            </div>
                        ` : `
                            <div class="pt-4 border-t border-slate-100 flex justify-between items-center">
                                <span class="text-green-600 font-bold text-sm"><i class="fas fa-check-double mr-1"></i> Terkirim</span>
                                ${t.bukti_url ? `<a href="${t.bukti_url}" target="_blank" class="text-blue-600 text-sm font-bold hover:underline"><i class="fas fa-image mr-1"></i> Lihat Foto</a>` : ''}
                            </div>
                        `}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Upload & Selesai
        window.completeTask = async function(id) {
            const fileInput = document.getElementById(`file-${id}`);
            if (!fileInput.files[0]) return alert('Silakan pilih foto bukti terlebih dahulu!');

            const btn = document.getElementById(`btn-${id}`);
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengupload...';

            try {
                const file = fileInput.files[0];
                const fileName = `bukti_${id}_${Date.now()}.${file.name.split('.').pop()}`;
                
                const { error: uploadError } = await supabase.storage.from('bukti').upload(fileName, file);
                if (uploadError) throw uploadError;

                const { data: urlData } = supabase.storage.from('bukti').getPublicUrl(fileName);
                
                const { error: updateError } = await supabase.from('tasks').update({ 
                    status: 'selesai', 
                    bukti_url: urlData.publicUrl 
                }).eq('id', id);

                if (updateError) throw updateError;
                
                alert('✅ Berhasil diselesaikan!');
                fetchTasks(); // Refresh data
            } catch (err) {
                alert('Error: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        };

        // Download CSV
        document.getElementById('btnDownloadCSV')?.addEventListener('click', () => {
            if (allTasks.length === 0) return alert('Tidak ada data.');
            
            const header = ["No Surat", "Tanggal", "Nama PT", "Alamat", "Penerima", "Status"];
            const csvData = allTasks.map(t => [
                `"${t.no_surat}"`, `"${t.tanggal_pengiriman}"`, `"${t.nama_pt}"`, 
                `"${t.alamat_singkat}"`, `"${t.penerima}"`, `"${t.status.toUpperCase()}"`
            ]);

            const csvContent = "\uFEFF" + [header.join(","), ...csvData.map(r => r.join(","))].join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Riwayat_Tugas_Kurir_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Event Listeners
        document.getElementById('btnLogout')?.addEventListener('click', () => {
            localStorage.clear();
            window.location.replace('index.html');
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            fetchTasks();
        });

    })();
    </script>
</body>
</html>
