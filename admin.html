<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel - PT KAG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .gradient-blue { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
        .gradient-rose { background: linear-gradient(135deg, #f43f5e 0%, #9f1239 100%); }
        .gradient-emerald { background: linear-gradient(135deg, #10b981 0%, #065f46 100%); }
        #editModal { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white/80 glass border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <img src="https://oyakbndsejhpqsvycdud.supabase.co/storage/v1/object/public/logo/fsimage%20(1).png" class="h-10 mr-3" alt="Logo">
                    <div>
                        <span class="font-bold text-slate-900 block leading-tight uppercase">PT Klase Auto Graha</span>
                        <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Courier Admin Panel</span>
                    </div>
                </div>
                <button id="btnLogout" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl font-bold text-sm hover:bg-rose-100 transition">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex-grow">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="gradient-blue p-6 rounded-[2rem] shadow-xl text-white">
                <p class="text-blue-100 text-[10px] font-bold uppercase mb-1">Total Tugas</p>
                <h3 id="statTotal" class="text-4xl font-extrabold">0</h3>
            </div>
            <div class="gradient-rose p-6 rounded-[2rem] shadow-xl text-white">
                <p class="text-rose-100 text-[10px] font-bold uppercase mb-1">Pending</p>
                <h3 id="statPending" class="text-4xl font-extrabold">0</h3>
            </div>
            <div class="gradient-emerald p-6 rounded-[2rem] shadow-xl text-white">
                <p class="text-emerald-100 text-[10px] font-bold uppercase mb-1">Selesai</p>
                <h3 id="statSelesai" class="text-4xl font-extrabold">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <div class="lg:col-span-2 bg-white rounded-[2rem] shadow-sm border border-slate-200 p-8">
                <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center">
                    <i class="fas fa-plus-circle text-blue-600 mr-2"></i> Buat Tugas Baru
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="no_surat" placeholder="No Surat / Referensi" class="bg-slate-50 border-0 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="select_kurir" class="bg-slate-50 border-0 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500"></select>
                    <input type="text" id="nama_pt" placeholder="Nama PT Tujuan" class="bg-slate-50 border-0 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="penerima" placeholder="Nama Penerima" class="bg-slate-50 border-0 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="alamat" placeholder="Alamat Detail" class="md:col-span-2 bg-slate-50 border-0 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button id="btnAssign" class="w-full mt-6 gradient-blue text-white font-bold py-4 rounded-xl shadow-lg transition hover:brightness-110 uppercase tracking-widest">Assign Kurir</button>
            </div>

            <div class="bg-slate-900 rounded-[2rem] p-8 text-white shadow-xl">
                <h2 class="text-lg font-bold mb-6 flex items-center"><i class="fas fa-filter mr-2 text-blue-400"></i> Filter & Laporan</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="date" id="filterStart" class="bg-slate-800 border-0 rounded-xl px-3 py-2 text-xs text-white">
                        <input type="date" id="filterEnd" class="bg-slate-800 border-0 rounded-xl px-3 py-2 text-xs text-white">
                    </div>
                    <input type="text" id="searchInput" placeholder="Cari No Surat / PT..." class="w-full bg-slate-800 border-0 rounded-xl px-5 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="btnPdf" class="w-full bg-rose-600 hover:bg-rose-700 py-3 rounded-xl text-xs font-bold transition flex items-center justify-center gap-2">
                        <i class="fas fa-file-pdf"></i> PDF LANDSCAPE
                    </button>
                    <button id="btnExcel" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl text-xs font-bold transition flex items-center justify-center gap-2">
                        <i class="fas fa-file-excel"></i> EXCEL / CSV
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden mb-12">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">
                            <th class="px-8 py-4">No Surat</th>
                            <th class="px-8 py-4">Posting</th>
                            <th class="px-8 py-4">Tujuan</th>
                            <th class="px-8 py-4">Kurir</th>
                            <th class="px-8 py-4">Status</th>
                            <th class="px-8 py-4">Keterangan</th>
                            <th class="px-8 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="taskBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="p-8">
                <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-pen-to-square text-blue-600"></i> Edit Tugas
                </h3>
                <input type="hidden" id="edit_id">
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">No Surat</label>
                        <input type="text" id="edit_no_surat" class="w-full bg-slate-50 border-0 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nama PT</label>
                        <input type="text" id="edit_nama_pt" class="w-full bg-slate-50 border-0 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Penerima</label>
                        <input type="text" id="edit_penerima" class="w-full bg-slate-50 border-0 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Keterangan (Admin/Kurir)</label>
                        <textarea id="edit_keterangan" class="w-full bg-slate-50 border-0 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500 h-24 resize-none"></textarea>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="closeEdit()" class="flex-1 py-3 font-bold text-slate-400 hover:text-slate-600 transition">Batal</button>
                    <button onclick="saveEdit()" class="flex-1 gradient-blue text-white py-3 rounded-xl font-bold shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        const SUPABASE_URL = 'https://oyakbndsejhpqsvycdud.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95YWtibmRzZWpocHFzdnljZHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODYwMjksImV4cCI6MjA4ODk2MjAyOX0.oH7XK00yZNKAuDF2GnXtdU3PUYRWtMQ4I43Q13AC9KE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allTasks = [];
        let profileMap = {};

        async function init() {
            if (localStorage.getItem('role') !== 'admin') { window.location.href = 'index.html'; return; }
            await loadProfiles();
            await loadTasks();
            
            // Listener Realtime
            supabase.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadTasks()).subscribe();
            
            // Event Filter
            document.getElementById('searchInput').oninput = applyFilters;
            document.getElementById('filterStart').onchange = applyFilters;
            document.getElementById('filterEnd').onchange = applyFilters;
        }

        async function loadProfiles() {
            const { data } = await supabase.from('profiles').select('id, full_name');
            const select = document.getElementById('select_kurir');
            select.innerHTML = '<option value="">-- Pilih Kurir --</option>';
            if (data) {
                data.forEach(p => {
                    profileMap[p.id] = p.full_name;
                    select.innerHTML += `<option value="${p.id}">${p.full_name}</option>`;
                });
            }
        }

        async function loadTasks() {
            const { data, error } = await supabase.from('tasks').select('*').order('created_at', { ascending: false });
            if (!error) {
                allTasks = data;
                applyFilters();
            }
        }

        function applyFilters() {
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            const filtered = allTasks.filter(t => {
                const dateTugas = t.created_at ? t.created_at.split('T')[0] : "";
                const matchDate = (!start || dateTugas >= start) && (!end || dateTugas <= end);
                const matchSearch = (t.nama_pt?.toLowerCase().includes(search)) || (t.no_surat?.toLowerCase().includes(search));
                return matchDate && matchSearch;
            });

            renderTable(filtered);
            updateStats(filtered);
        }

        function updateStats(tasks) {
            document.getElementById('statTotal').innerText = tasks.length;
            document.getElementById('statPending').innerText = tasks.filter(t => t.status === 'pending').length;
            document.getElementById('statSelesai').innerText = tasks.filter(t => t.status === 'selesai').length;
        }

        function renderTable(data) {
            const tbody = document.getElementById('taskBody');
            tbody.innerHTML = '';
            data.forEach(t => {
                const isDone = t.status === 'selesai';
                const tgl = t.created_at ? new Date(t.created_at).toLocaleDateString('id-ID') : '-';
                
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition text-[11px] font-bold">
                        <td class="px-8 py-5 text-blue-600">${t.no_surat || '-'}</td>
                        <td class="px-8 py-5 text-slate-400 font-medium">${tgl}</td>
                        <td class="px-8 py-5">
                            <div class="text-slate-800">${t.nama_pt || '-'}</div>
                            <div class="text-[9px] text-slate-400 font-normal italic">${t.penerima || '-'}</div>
                        </td>
                        <td class="px-8 py-5 text-slate-500">${profileMap[t.assigned_to] || 'Kurir Keluar'}</td>
                        <td class="px-8 py-5">
                            <span class="px-3 py-1 rounded-full text-[9px] uppercase ${isDone ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                                ${t.status}
                            </span>
                        </td>
                        <td class="px-8 py-5 text-slate-500 font-normal italic max-w-[150px] truncate" title="${t.keterangan || '-'}">
                            ${t.keterangan || '-'}
                        </td>
                        <td class="px-8 py-5">
                            <div class="flex justify-center gap-4">
                                ${t.bukti_url ? `<a href="${t.bukti_url}" target="_blank" class="text-blue-500"><i class="fas fa-image"></i></a>` : ''}
                                <button onclick="openEdit('${t.id}', '${t.no_surat||''}', '${t.nama_pt||''}', '${t.penerima||''}', '${t.keterangan||''}')" class="text-amber-500 hover:text-amber-600">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteTask('${t.id}')" class="text-slate-300 hover:text-rose-600 transition">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        // --- Fungsi Assign ---
        document.getElementById('btnAssign').onclick = async () => {
            const payload = {
                no_surat: document.getElementById('no_surat').value,
                nama_pt: document.getElementById('nama_pt').value,
                penerima: document.getElementById('penerima').value,
                alamat_singkat: document.getElementById('alamat').value,
                assigned_to: document.getElementById('select_kurir').value,
                status: 'pending'
            };
            if(!payload.nama_pt || !payload.assigned_to) return alert('Nama PT dan Kurir wajib diisi!');
            
            const { error } = await supabase.from('tasks').insert([payload]);
            if(!error) {
                alert('Tugas berhasil dikirim!');
                document.querySelectorAll('input').forEach(i => i.value = '');
                loadTasks();
            }
        };

        // --- Fungsi Edit ---
        window.openEdit = (id, no, pt, penerima, ket) => {
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_no_surat').value = no;
            document.getElementById('edit_nama_pt').value = pt;
            document.getElementById('edit_penerima').value = penerima;
            document.getElementById('edit_keterangan').value = ket;
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.closeEdit = () => document.getElementById('editModal').classList.add('hidden');

        window.saveEdit = async () => {
            const id = document.getElementById('edit_id').value;
            const updateData = {
                no_surat: document.getElementById('edit_no_surat').value,
                nama_pt: document.getElementById('edit_nama_pt').value,
                penerima: document.getElementById('edit_penerima').value,
                keterangan: document.getElementById('edit_keterangan').value
            };
            const { error } = await supabase.from('tasks').update(updateData).eq('id', id);
            if(!error) {
                closeEdit();
                loadTasks();
            }
        };

        // --- Fungsi Delete ---
        window.deleteTask = async (id) => {
            if(confirm('Hapus tugas ini secara permanen?')) {
                await supabase.from('tasks').delete().eq('id', id);
                loadTasks();
            }
        };

        // --- Export PDF (Landscape) ---
        document.getElementById('btnPdf').onclick = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;
            
            const filtered = allTasks.filter(t => {
                const dateTugas = t.created_at ? t.created_at.split('T')[0] : "";
                return (!start || dateTugas >= start) && (!end || dateTugas <= end);
            });

            doc.setFontSize(14);
            doc.text("LAPORAN PENGIRIMAN PT KLASE AUTO GRAHA", 14, 15);
            doc.setFontSize(10);
            doc.text(`Periode: ${start || '-'} s/d ${end || '-'}`, 14, 22);

            const rows = filtered.map(t => [
                t.no_surat || '-',
                t.created_at ? new Date(t.created_at).toLocaleDateString('id-ID') : '-',
                t.nama_pt || '-',
                t.penerima || '-',
                profileMap[t.assigned_to] || '-',
                t.status.toUpperCase(),
                t.keterangan || '-'
            ]);

            doc.autoTable({
                startY: 28,
                head: [['No Surat', 'Posting', 'Tujuan', 'Penerima', 'Kurir', 'Status', 'Keterangan']],
                body: rows,
                headStyles: { fillColor: [37, 99, 235] },
                styles: { fontSize: 8 },
                columnStyles: { 6: { cellWidth: 50 } } // Kolom keterangan dibuat lebar
            });
            doc.save(`Laporan_KAG_${new Date().getTime()}.pdf`);
        };

        // --- Export Excel (CSV) ---
        document.getElementById('btnExcel').onclick = () => {
            let csv = ["\uFEFFNo Surat,Tgl Posting,Tujuan,Penerima,Kurir,Status,Keterangan"];
            allTasks.forEach(t => {
                csv.push([
                    `"${t.no_surat || '-'}"`,
                    `"${t.created_at || '-'}"`,
                    `"${t.nama_pt || '-'}"`,
                    `"${t.penerima || '-'}"`,
                    `"${profileMap[t.assigned_to] || '-'}"`,
                    `"${t.status}"`,
                    `"${(t.keterangan || '-').replace(/"/g, '""')}"`
                ].join(','));
            });
            const blob = new Blob([csv.join("\n")], { type: "text/csv;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Laporan_KAG.csv`;
            link.click();
        };

        document.getElementById('btnLogout').onclick = () => { localStorage.clear(); window.location.href = 'index.html'; };
        
        init();
    })();
    </script>
</body>
</html>
